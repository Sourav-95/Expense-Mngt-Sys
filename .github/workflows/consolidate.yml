name: Consolidation Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 9:30 AM IST = 04:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  run-consolidation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Run consolidation
        env:
          SA_KEY_PATH        : /tmp/sa_key.json
          GMAIL_FROM         : ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD : ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL    : ${{ secrets.NOTIFY_TO_EMAIL }}
        run: python -m src.load.consolidate