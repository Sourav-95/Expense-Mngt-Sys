name: Daily Expense Pipeline

on:
  schedule:
    - cron: '37 19 * * *'  # 1:00 AM IST = 19:30 UTC previous day
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Run pipeline
        env:
          SA_KEY_PATH        : /tmp/sa_key.json
          GMAIL_FROM         : ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD : ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO_EMAIL    : ${{ secrets.NOTIFY_TO_EMAIL }}
        run: python main.py